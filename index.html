<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f7f3eb" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a1e" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="随手记">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>随手记</title>
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>

<div id="app" class="app">

  <!-- ═══ 主页 ═══ -->
  <div id="pageMain" class="page active">

    <!-- Header -->
    <header class="header">
      <h1>📔 随手记</h1>
      <div class="header-actions">
        <button id="trashBtn" title="回收站">🗑️</button>
        <button id="themeBtn" title="主题切换"></button>
        <button id="settingsBtn" title="设置">⚙️</button>
      </div>
    </header>

    <!-- Tab Bar -->
    <div class="view-tabs">
      <button id="tabList" class="tab active">📋 日记列表</button>
      <button id="tabCalendar" class="tab">📅 月视图</button>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="搜索日记内容、标签…" spellcheck="false">
      <button id="searchClear" class="btn-clear">✕</button>
    </div>

    <!-- ── 日记列表 ── -->
    <div id="viewList" class="tab-content active">
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">📝</div>
        <p>还没有日记<br>点击右下角 ✚ 写下第一篇吧</p>
      </div>
      <ul id="diaryList" class="diary-list"></ul>
    </div>

    <!-- ── 月视图 ── -->
    <div id="viewCalendar" class="tab-content">
      <div class="cal-inline-header">
        <button id="calPrev" class="cal-nav-btn">‹</button>
        <span id="calTitle" class="cal-title"></span>
        <button id="calNext" class="cal-nav-btn">›</button>
      </div>
      <div id="calGrid" class="calendar-grid"></div>
    </div>

  </div>

  <!-- ═══ 全屏编辑器 ═══ -->
  <div id="pageEditor" class="page editor-page">
    <header class="editor-header">
      <button id="editorBack" class="editor-back">← 返回</button>
      <span id="editorDate" class="editor-date"></span>
      <button id="editorSave" class="editor-save-btn">💾 保存</button>
    </header>

    <div class="toolbar" id="toolbar"></div>
    <div class="editor-scroll">
      <textarea id="diaryTextarea" class="editor-textarea" placeholder="写日记…" spellcheck="false"></textarea>
      <div id="preview" class="preview-card"></div>
      <div class="tag-input-wrap">
        <input id="tagInput" type="text" placeholder="+ 添加标签" spellcheck="false">
        <button id="tagAddBtn">添加</button>
      </div>
      <div id="tagSelector" class="tag-selector"></div>
    </div>
  </div>

  <!-- ═══ 设置页 ═══ -->
  <div id="pageSettings" class="page settings-page">
    <header class="editor-header">
      <button id="settingsBack" class="editor-back">← 返回</button>
      <span style="font-weight:600;">⚙️ 设置</span>
      <span></span>
    </header>

    <div style="padding:16px;display:flex;flex-direction:column;gap:16px;">

      <!-- 回收站 -->
      <div class="settings-card">
        <div class="settings-card-title">🗑️ 回收站</div>
        <div id="emptyTrash" class="empty-state" style="padding:20px 0;">
          <p>回收站是空的</p>
        </div>
        <div id="trashList" class="diary-list"></div>
      </div>

      <!-- 数据管理 -->
      <div class="settings-card">
        <div class="settings-card-title">📤 数据管理</div>
        <div class="settings-btn-row">
          <button id="exportJsonBtn" class="settings-btn">导出 JSON</button>
          <button id="exportMdBtn" class="settings-btn">导出 Markdown</button>
          <button id="importBtn" class="settings-btn">导入 JSON</button>
        </div>
        <input id="importFile" type="file" accept=".json" style="display:none;">
      </div>

    </div>
  </div>

  <!-- ═══ FAB 悬浮按钮 ═══ -->
  <button id="fabBtn" class="fab" title="新建日记">✚</button>

  <!-- Toast -->
  <div id="toast" class="toast-container"></div>
</div>

<script src="js/storage.js?v=3"></script>
<script src="js/markdown.js?v=3"></script>
<script src="js/diary.js?v=3"></script>
<script src="js/app-latest.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    return Promise.all(regs.map(function(r) { return r.unregister(); }));
  }).then(function() {
    return navigator.serviceWorker.register('sw.js');
  }).catch(function(err) {
    console.log('SW 注册失败:', err);
  });
}
</script>
</body>
</html>
